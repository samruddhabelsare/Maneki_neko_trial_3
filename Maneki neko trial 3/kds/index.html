<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maneki Neko | Kitchen Display</title>
    <meta name="description" content="Maneki Neko Smart Restaurant — Kitchen Display System">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/theme.css">
    <style>
        /* ── KDS Specific Styles ─────────────────────────────────────── */
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top Navbar ──────────────────────────────────────────────── */
        .kds-header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            flex-shrink: 0;
        }

        .kds-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .kds-brand span { font-size: 1.5rem; }

        .kds-brand h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: var(--tracking-tight);
        }

        .kds-clock {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            background: var(--bg-surface-variant);
            padding: 0.375rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .kds-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .kds-status-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: none;
        }

        @media (min-width: 768px) {
            .kds-status-text { display: block; }
        }

        .kds-status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
        }

        /* ── Summary Bar ─────────────────────────────────────────────── */
        .kds-summary {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            z-index: 10;
            flex-shrink: 0;
        }

        .summary-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .summary-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .pill-pending   { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
        .pill-preparing { background: var(--info-bg);    color: var(--info);    border: 1px solid var(--info-border); }
        .pill-ready     { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }

        .pill-count {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.125rem 0.5rem;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-left: 0.25rem;
        }

        #refreshBtn {
            background: var(--bg-surface-variant);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-pill);
            transition: all var(--duration-fast) var(--ease-out);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        #refreshBtn:hover {
            background: var(--bg-surface-bright);
            border-color: var(--glass-border-hover);
            color: var(--primary);
        }

        /* ── Kanban Board ────────────────────────────────────────────── */
        .kanban {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 1.5rem;
        }

        .kanban-inner {
            display: flex;
            height: 100%;
            gap: 1.5rem;
            min-width: 900px;
        }

        .kanban-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface-low);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .kanban-column-header {
            background: var(--bg-surface);
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            font-size: 0.95rem;
        }

        .kanban-column-header span { font-size: 1.125rem; }

        .kanban-cards {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* ── Order Cards ─────────────────────────────────────────────── */
        .col-empty {
            text-align: center;
            color: var(--text-dimmed);
            padding: 2rem;
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.02);
            font-weight: 500;
        }

        .col-empty span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        .order-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-card);
            transition: all var(--duration-normal) var(--ease-out);
            position: relative;
            overflow: hidden;
        }

        .order-card:hover {
            transform: translateY(-2px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--shadow-card-hover);
        }

        .order-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
        }

        .order-card.status-pending::before   { background: var(--warning); }
        .order-card.status-preparing::before  { background: var(--info); }
        .order-card.status-ready::before      { background: var(--success); }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .table-badge {
            background: var(--text-primary);
            color: var(--bg-deep);
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 0.5rem;
            letter-spacing: var(--tracking-wide);
        }

        .order-id {
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .timer {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--bg-surface-variant);
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .timer::before { content: "⏱️"; font-size: 0.8rem; }

        .timer.timer-red {
            color: var(--danger);
            background: var(--danger-bg);
            animation: pluseAlert 2s infinite;
        }

        /* Items List */
        .items-list {
            list-style: none;
            padding: 0;
            margin: 0 0 1.25rem 0;
            font-size: 0.95rem;
        }

        .items-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed var(--border);
        }

        .items-list li:last-child { border-bottom: none; }

        .item-qty {
            font-weight: 700;
            color: var(--primary);
            background: var(--primary-glow);
            padding: 0.1rem 0.4rem;
            border-radius: 0.3rem;
            font-size: 0.8rem;
        }

        .item-name {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            line-height: 1.2;
        }

        .veg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .veg-dot.veg    { background: var(--success); }
        .veg-dot.nonveg { background: var(--danger); }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            font-weight: 700;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            transition: all var(--duration-fast) var(--ease-out);
            font-size: 0.875rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-start {
            background: var(--warning-bg);
            color: var(--warning);
            border-color: var(--warning-border);
        }

        .btn-start:hover { background: rgba(245, 158, 11, 0.2); }

        .btn-ready {
            background: var(--info-bg);
            color: var(--info);
            border-color: var(--info-border);
        }

        .btn-ready:hover { background: rgba(59, 130, 246, 0.2); }

        .btn-serve {
            background: var(--success-bg);
            color: var(--success);
            border-color: var(--success-border);
        }

        .btn-serve:hover { background: rgba(16, 185, 129, 0.2); }

        /* Animations */
        @keyframes pluseAlert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .flash-new {
            animation: HighlightNew 3s ease-out;
        }

        @keyframes HighlightNew {
            0%   { box-shadow: 0 0 0 4px var(--primary-raw); border-color: var(--primary-raw); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body>

    <!-- ── Top Navbar ──────────────────────────────────────────────────── -->
    <header class="kds-header">
        <div class="kds-brand">
            <span>🍳</span>
            <h1>Kitchen Display</h1>
        </div>
        <div class="kds-clock">
            <span id="liveClock">00:00:00</span>
        </div>
        <div class="kds-status">
            <span class="kds-status-text">Maneki Neko Tokyo</span>
            <div class="kds-status-dot"></div>
        </div>
    </header>

    <!-- ── Summary Bar ─────────────────────────────────────────────────── -->
    <div class="kds-summary">
        <div class="summary-pills">
            <div class="summary-pill pill-pending">
                🟡 Pending: <span id="countPending" class="pill-count">0</span>
            </div>
            <div class="summary-pill pill-preparing">
                🔵 Preparing: <span id="countPreparing" class="pill-count">0</span>
            </div>
            <div class="summary-pill pill-ready">
                🟢 Ready: <span id="countReady" class="pill-count">0</span>
            </div>
        </div>
        <button id="refreshBtn">
            ↻ Refresh Now
        </button>
    </div>

    <!-- ── Kanban Board ─────────────────────────────────────────────────── -->
    <main class="kanban">
        <div class="kanban-inner">

            <!-- Pending Column -->
            <div class="kanban-column">
                <div class="kanban-column-header">
                    <span>🟡</span> Pending Orders
                </div>
                <div class="kanban-cards" id="cards-pending"></div>
            </div>

            <!-- Preparing Column -->
            <div class="kanban-column">
                <div class="kanban-column-header">
                    <span>🔵</span> Now Preparing
                </div>
                <div class="kanban-cards" id="cards-preparing"></div>
            </div>

            <!-- Ready Column -->
            <div class="kanban-column">
                <div class="kanban-column-header">
                    <span>🟢</span> Ready to Serve
                </div>
                <div class="kanban-cards" id="cards-ready"></div>
            </div>

        </div>
    </main>

    <!-- ── Scripts ──────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
